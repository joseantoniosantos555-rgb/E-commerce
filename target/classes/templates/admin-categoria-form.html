<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Categoria - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .text-white, .text-white-50 { color: #846651 !important; }
        .opacity-75 { color: rgba(132, 102, 81, 0.75) !important; }
    </style>
</head>
<body style="background: linear-gradient(135deg, #ffffff 0%, #ffece8 50%, #ffffff 100%); min-height: 100vh; font-family: 'Open Sans', sans-serif;">
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h4 style="color: #846651; font-family: 'Dancing Script', cursive; font-size: 2rem;">
                            <i class="fas fa-tags me-2"></i>Cadastrar Nova Categoria
                        </h4>
                    </div>
                    <div class="card-body">
                        <div class="alert alert-success" th:if="${sucesso}" th:text="${sucesso}"></div>
                        <div class="alert alert-danger" th:if="${erro}" th:text="${erro}"></div>
                        
                        <form action="/admin/categorias/salvar" method="post">
                            <div class="mb-3">
                                <label class="form-label">Nome da Categoria</label>
                                <input type="text" class="form-control" name="nome" required>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Descrição</label>
                                <textarea class="form-control" name="descricao" rows="3"></textarea>
                            </div>
                            
                            <div class="d-flex justify-content-between">
                                <div>
                                    <a href="/" class="btn btn-secondary me-2">
                                        <i class="fas fa-arrow-left me-2"></i>Voltar
                                    </a>
                                    <a href="/admin/dashboard" class="btn btn-outline-secondary me-2">
                                        <i class="fas fa-tachometer-alt me-2"></i>Dashboard
                                    </a>
                                    <a href="/admin/categorias" class="btn btn-outline-primary">
                                        <i class="fas fa-list me-2"></i>Gerenciar Categorias
                                    </a>
                                </div>
                                <button type="submit" class="btn btn-success">
                                    <i class="fas fa-save me-2"></i>Salvar Categoria
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
