<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos - E-Commerce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">
                <i class="fas fa-shopping-cart me-2"></i>E-Commerce
            </a>
            
            <div class="navbar-nav ms-auto">
                <div th:if="${!isLoggedIn}">
                    <a class="nav-link btn btn-outline-light me-2" th:href="@{/login}">Login</a>
                </div>
                
                <div th:if="${isLoggedIn}" class="d-flex align-items-center">
                    <a th:href="@{/cart}" class="btn btn-outline-light me-3">
                        <i class="fas fa-shopping-cart me-1"></i>
                        Carrinho (<span th:text="${cartItemCount}">0</span>)
                    </a>
                    
                    <div class="dropdown">
                        <a class="nav-link dropdown-toggle text-white" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="fas fa-user me-1"></i>
                            <span th:text="${currentUser.fullName}">Usuário</span>
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" th:href="@{/}">Início</a></li>
                            <li th:if="${currentUser.admin}"><a class="dropdown-item" th:href="@{/products/admin}">Gerenciar Produtos</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" th:href="@{/logout}">Sair</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Filtros -->
        <div class="row mb-4">
            <div class="col-md-8">
                <form th:action="@{/products}" method="get" class="d-flex">
                    <input type="text" class="form-control me-2" name="search" 
                           th:value="${searchTerm}" placeholder="Buscar produtos...">
                    <button type="submit" class="btn btn-outline-primary">
                        <i class="fas fa-search"></i>
                    </button>
                </form>
            </div>
            <div class="col-md-4">
                <select class="form-select" onchange="filterByCategory(this.value)">
                    <option value="">Todas as categorias</option>
                    <option th:each="cat : ${categories}" 
                            th:value="${cat}" 
                            th:text="${cat}"
                            th:selected="${cat == selectedCategory}">Categoria</option>
                </select>
            </div>
        </div>

        <!-- Produtos -->
        <div class="row">
            <div class="col-12" th:if="${products.empty}">
                <div class="alert alert-info text-center">
                    <i class="fas fa-info-circle me-2"></i>
                    Nenhum produto encontrado.
                </div>
            </div>
            
            <div class="col-md-4 mb-4" th:each="product : ${products}">
                <div class="card h-100">
                    <div class="card-img-top bg-light d-flex align-items-center justify-content-center" style="height: 200px;">
                        <i class="fas fa-image fa-3x text-muted" th:if="${product.urlImagem == null}"></i>
                        <img th:if="${product.urlImagem != null}" th:src="${product.urlImagem}" 
                             th:alt="${product.nome}" class="img-fluid" style="max-height: 180px;">
                    </div>
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title" th:text="${product.nome}">Nome do Produto</h5>
                        <p class="card-text text-muted small" th:text="${product.descricao}">Descrição</p>
                        <div class="mt-auto">
                            <p class="card-text">
                                <strong class="text-success h5" th:text="'R$ ' + ${#numbers.formatDecimal(product.preco, 1, 2)}">R$ 0,00</strong>
                            </p>
                            <p class="card-text">
                                <small class="text-muted">
                                    <i class="fas fa-box me-1"></i>
                                    Estoque: <span th:text="${product.estoque}">0</span>
                                </small>
                            </p>
                            <div th:if="${isLoggedIn and product.estoque > 0}">
                                <form th:action="@{/products/add-to-cart}" method="post" class="d-flex">
                                    <input type="hidden" name="productId" th:value="${product.id}">
                                    <input type="number" name="quantity" value="1" min="1" 
                                           th:max="${product.estoque}" class="form-control form-control-sm me-2" style="width: 70px;">
                                    <button type="submit" class="btn btn-primary btn-sm flex-grow-1">
                                        <i class="fas fa-cart-plus me-1"></i>Adicionar
                                    </button>
                                </form>
                            </div>
                            <div th:if="${!isLoggedIn}">
                                <a class="btn btn-outline-primary btn-sm w-100" th:href="@{/login}">
                                    Faça login para comprar
                                </a>
                            </div>
                            <div th:if="${isLoggedIn and product.estoque == 0}">
                                <button class="btn btn-secondary btn-sm w-100" disabled>
                                    Fora de estoque
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function filterByCategory(category) {
            if (category) {
                window.location.href = '/ecommerce/products?categoria=' + encodeURIComponent(category);
            } else {
                window.location.href = '/ecommerce/products';
            }
        }
    </script>
</body>
</html>
