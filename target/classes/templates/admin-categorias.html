<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Categorias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .text-white, .text-white-50 { color: #846651 !important; }
        .opacity-75 { color: rgba(132, 102, 81, 0.75) !important; }
    </style>
</head>
<body style="background: linear-gradient(135deg, #ffffff 0%, #ffece8 50%, #ffffff 100%); min-height: 100vh; font-family: 'Open Sans', sans-serif;">
    <div class="container-fluid mt-4">
        <div class="row">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 style="color: #846651; font-family: 'Dancing Script', cursive; font-size: 2.5rem;">
                        <i class="fas fa-tags me-2"></i>Gerenciar Categorias
                    </h2>
                    <div>
                        <a href="javascript:history.back()" class="btn btn-outline-secondary me-2">
                            <i class="fas fa-arrow-left me-2"></i>Voltar
                        </a>
                        <a href="/admin/categorias/novo" class="btn btn-success me-2">
                            <i class="fas fa-plus me-2"></i>Nova Categoria
                        </a>
                        <a href="/admin/dashboard" class="btn btn-secondary">
                            <i class="fas fa-chart-bar me-2"></i>Dashboard
                        </a>
                    </div>
                </div>

                <div class="alert alert-success" th:if="${sucesso}" th:text="${sucesso}"></div>
                <div class="alert alert-danger" th:if="${erro}" th:text="${erro}"></div>

                <div class="card">
                    <div class="card-header">
                        <h5 style="font-family: 'Dancing Script', cursive; font-size: 1.8rem;">
                            <i class="fas fa-list me-2"></i>Lista de Categorias
                        </h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Nome</th>
                                        <th>Descrição</th>
                                        <th>Ações</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="categoria : ${categorias}">
                                        <td th:text="${categoria.idCategoria}">1</td>
                                        <td th:text="${categoria.nome}">Categoria</td>
                                        <td th:text="${categoria.descricao}">Descrição</td>
                                        <td>
                                            <button class="btn btn-outline-danger btn-sm" th:onclick="'deleteCategory(' + ${categoria.idCategoria} + ')'" title="Excluir">
                                                <i class="fas fa-trash"></i>
                                            </button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Modal de Confirmação de Exclusão -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Confirmar Exclusão</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    Tem certeza que deseja excluir esta categoria? Esta ação não pode ser desfeita.
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <form id="deleteForm" method="post" style="display: inline;">
                        <button type="submit" class="btn btn-danger">Excluir</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        function deleteCategory(id) {
            const deleteForm = document.getElementById('deleteForm');
            deleteForm.action = '/admin/categorias/excluir/' + id;
            
            const modal = new bootstrap.Modal(document.getElementById('deleteModal'));
            modal.show();
        }
    </script>
</body>
</html>
