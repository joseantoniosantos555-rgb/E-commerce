<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Estilo Feminino</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .text-white, .text-white-50 { color: #846651 !important; }
        .opacity-75 { color: rgba(132, 102, 81, 0.75) !important; }
        .card-stats { background: linear-gradient(135deg, #ffece8 0%, #ffffff 100%); border: 1px solid #846651; }
    </style>
</head>
<body style="background: linear-gradient(135deg, #ffffff 0%, #ffece8 50%, #ffffff 100%); min-height: 100vh; font-family: 'Open Sans', sans-serif;">
    <div class="container-fluid mt-4">
        <div class="row">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 style="color: #846651; font-family: 'Dancing Script', cursive; font-size: 2.5rem;">
                        <i class="fas fa-chart-bar me-2"></i>Dashboard Administrativo
                    </h2>
                    <div>
                        <a href="javascript:history.back()" class="btn btn-outline-secondary me-2">
                            <i class="fas fa-arrow-left me-2"></i>Voltar
                        </a>
                        <a href="/admin/produtos" class="btn btn-primary me-2">
                            <i class="fas fa-box me-2"></i>Produtos
                        </a>
                        <a href="/admin/pedidos" class="btn btn-success me-2">
                            <i class="fas fa-shopping-cart me-2"></i>Pedidos
                        </a>
                        <a href="/" class="btn btn-secondary">
                            <i class="fas fa-home me-2"></i>Voltar ao Site
                        </a>
                    </div>
                </div>

                <!-- Cards de Estatísticas -->
                <div class="row mb-4">
                    <div class="col-md-3">
                        <div class="card card-stats">
                            <div class="card-body text-center">
                                <i class="fas fa-box fa-3x text-primary mb-3"></i>
                                <h3 th:text="${totalProdutos}">0</h3>
                                <p class="text-muted">Total de Produtos</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card card-stats">
                            <div class="card-body text-center">
                                <i class="fas fa-shopping-cart fa-3x text-success mb-3"></i>
                                <h3 th:text="${totalPedidos}">0</h3>
                                <p class="text-muted">Total de Pedidos</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card card-stats">
                            <div class="card-body text-center">
                                <i class="fas fa-dollar-sign fa-3x text-warning mb-3"></i>
                                <h3>R$ <span th:text="${#numbers.formatDecimal(totalVendas, 1, 2)}">0,00</span></h3>
                                <p class="text-muted">Total em Vendas</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card card-stats">
                            <div class="card-body text-center">
                                <i class="fas fa-users fa-3x text-info mb-3"></i>
                                <h3 th:text="${#lists.size(pedidosRecentes)}">0</h3>
                                <p class="text-muted">Pedidos Recentes</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Pedidos Recentes -->
                <div class="card">
                    <div class="card-header">
                        <h5 style="font-family: 'Dancing Script', cursive; font-size: 1.8rem;">
                            <i class="fas fa-clock me-2"></i>Pedidos Recentes
                        </h5>
                    </div>
                    <div class="card-body">
                        <div th:if="${#lists.isEmpty(pedidosRecentes)}" class="text-center text-muted">
                            <i class="fas fa-inbox fa-3x mb-3"></i>
                            <p>Nenhum pedido encontrado</p>
                        </div>
                        
                        <div th:if="${!#lists.isEmpty(pedidosRecentes)}" class="table-responsive">
                            <table class="table table-striped">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Cliente</th>
                                        <th>Data</th>
                                        <th>Total</th>
                                        <th>Status</th>
                                        <th>Ações</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="pedido : ${pedidosRecentes}">
                                        <td th:text="${pedido.idPedido}">1</td>
                                        <td th:text="${pedido.usuario.nome}">Cliente</td>
                                        <td th:text="${#temporals.format(pedido.dataPedido, 'dd/MM/yyyy HH:mm')}">01/01/2024</td>
                                        <td>R$ <span th:text="${#numbers.formatDecimal(pedido.valorTotal, 1, 2)}">0,00</span></td>
                                        <td>
                                            <span class="badge bg-primary" th:text="${pedido.statusPedido}">AGUARDANDO</span>
                                        </td>
                                        <td>
                                            <a th:href="@{/pedidos/{id}/acompanhar(id=${pedido.idPedido})}" class="btn btn-sm btn-outline-primary">
                                                <i class="fas fa-eye"></i>
                                            </a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
