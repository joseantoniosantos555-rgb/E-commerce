<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Pedidos - Estilo Feminino</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .text-white, .text-white-50 { color: #846651 !important; }
        .opacity-75 { color: rgba(132, 102, 81, 0.75) !important; }
    </style>
</head>
<body style="background: linear-gradient(135deg, #ffffff 0%, #ffece8 50%, #ffffff 100%); min-height: 100vh; font-family: 'Open Sans', sans-serif;">
    <div class="container mt-4">
        <h2 style="color: #846651; font-family: 'Dancing Script', cursive; font-size: 2.5rem;"><i class="fas fa-shopping-bag me-2"></i>Meus Pedidos</h2>
        
        <div class="alert alert-success" th:if="${sucesso}" th:text="${sucesso}"></div>
        
        <div th:if="${#lists.isEmpty(pedidos)}" class="text-center mt-5">
            <i class="fas fa-shopping-bag text-muted" style="font-size: 4rem;"></i>
            <h4 class="mt-3">Nenhum pedido encontrado</h4>
            <p class="text-muted">Você ainda não fez nenhum pedido.</p>
            <a href="/produtos" class="btn btn-primary">
                <i class="fas fa-shopping-bag me-2"></i>Fazer Primeiro Pedido
            </a>
        </div>
        
        <div th:if="${!#lists.isEmpty(pedidos)}">
            <div th:each="pedido : ${pedidos}" class="card mb-3">
                <div class="card-body">
                    <div class="row align-items-center">
                        <div class="col-md-2">
                            <h6>Pedido #<span th:text="${pedido.idPedido}">123</span></h6>
                            <small class="text-muted" th:text="${#temporals.format(pedido.dataPedido, 'dd/MM/yyyy')}">01/01/2024</small>
                        </div>
                        <div class="col-md-3">
                            <span class="badge bg-primary" th:text="${pedido.statusPedido}">AGUARDANDO</span>
                        </div>
                        <div class="col-md-2">
                            <strong>R$ <span th:text="${#numbers.formatDecimal(pedido.valorTotal, 1, 2)}">0,00</span></strong>
                        </div>
                        <div class="col-md-3">
                            <small class="text-muted" th:text="${pedido.enderecoEntrega}">Endereço</small>
                        </div>
                        <div class="col-md-2 text-end">
                            <a th:href="@{/pedidos/{id}/acompanhar(id=${pedido.idPedido})}" class="btn btn-outline-primary btn-sm me-1">
                                <i class="fas fa-eye me-1"></i>Acompanhar
                            </a>
                            <a th:href="@{/nota-fiscal/gerar/{id}(id=${pedido.idPedido})}" class="btn btn-outline-success btn-sm" target="_blank">
                                <i class="fas fa-file-pdf me-1"></i>Nota Fiscal
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="mt-4">
            <a href="/" class="btn btn-secondary">
                <i class="fas fa-home me-2"></i>Voltar ao Início
            </a>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
