<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Estilo Feminino</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: linear-gradient(135deg, #ffece8 0%, #ffffff 100%);
            --secondary: linear-gradient(135deg, #846651 0%, #6b5442 100%);
            --accent: linear-gradient(135deg, #ffece8 0%, #ffffff 100%);
            --white: #ffffff;
            --cream: #ffece8;
            --brown: #846651;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Open Sans', sans-serif;
            background: linear-gradient(135deg, #ffffff 0%, #ffece8 50%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        
        /* Animated Background */
        .bg-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }
        
        .floating-shapes {
            position: absolute;
            width: 100px;
            height: 100px;
            background: rgba(255, 236, 232, 0.3);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }
        
        .shape-1 {
            top: 10%;
            left: 10%;
            animation-delay: 0s;
            width: 80px;
            height: 80px;
        }
        
        .shape-2 {
            top: 20%;
            right: 10%;
            animation-delay: 2s;
            width: 120px;
            height: 120px;
        }
        
        .shape-3 {
            bottom: 20%;
            left: 15%;
            animation-delay: 4s;
            width: 60px;
            height: 60px;
        }
        
        .shape-4 {
            bottom: 30%;
            right: 20%;
            animation-delay: 1s;
            width: 90px;
            height: 90px;
        }
        
        /* Login Container */
        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 500px;
            padding: 0 20px;
        }
        
        @media (min-width: 768px) {
            .login-container {
                max-width: 600px;
            }
        }
        
        @media (min-width: 1200px) {
            .login-container {
                max-width: 700px;
            }
        }
        
        /* Glass Card */
        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 0;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            animation: slideInUp 0.8s ease;
        }
        
        /* Header */
        .login-header {
            background: rgba(255, 255, 255, 0.1);
            padding: 2.5rem 2rem 1.5rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .brand-logo {
            font-size: 3rem;
            background: var(--accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }
        
        @import url('https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&display=swap');
        
        .brand-title {
            font-family: 'Kalam', cursive;
            font-size: 2.2rem;
            font-weight: 700;
            color: #846651;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 10px rgba(132, 102, 81, 0.3);
        }
        
        .brand-subtitle {
            color: rgba(132, 102, 81, 0.8);
            font-weight: 400;
        }
        
        /* Form */
        .login-form {
            padding: 2rem;
        }
        
        .form-group {
            position: relative;
            margin-bottom: 1.5rem;
        }
        
        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 1rem 1rem 1rem 3rem;
            color: #846651;
            font-weight: 500;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 0 0.2rem rgba(255, 255, 255, 0.1);
            color: #846651;
        }
        
        .form-control::placeholder {
            color: rgba(132, 102, 81, 0.7);
        }
        
        .form-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(132, 102, 81, 0.7);
            font-size: 1.1rem;
            z-index: 5;
        }
        
        /* Buttons */
        .btn-gradient {
            background: var(--secondary);
            border: none;
            border-radius: 15px;
            padding: 1rem 2rem;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(240, 147, 251, 0.4);
            width: 100%;
        }
        
        .btn-gradient:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(240, 147, 251, 0.6);
            color: white;
        }
        
        .btn-glass {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 0.75rem 1.5rem;
            color: #846651;
            font-weight: 500;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-glass:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #846651;
            transform: translateY(-2px);
            text-decoration: none;
        }
        
        /* Test Users */
        .test-users {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 1.5rem;
            margin-top: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .test-title {
            color: rgba(132, 102, 81, 0.9);
            font-weight: 600;
            margin-bottom: 1rem;
            text-align: center;
        }
        
        .user-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .user-card:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }
        
        .user-card:last-child {
            margin-bottom: 0;
        }
        
        .user-type {
            font-weight: 600;
            color: #846651;
            margin-bottom: 0.25rem;
        }
        
        .user-credentials {
            font-size: 0.9rem;
            color: rgba(132, 102, 81, 0.8);
            line-height: 1.4;
        }
        
        /* Alert */
        .alert {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.3);
            border-radius: 15px;
            color: #ff6b7a;
            backdrop-filter: blur(10px);
        }
        
        /* Back Link */
        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }
        
        .back-link a {
            color: rgba(132, 102, 81, 0.8);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .back-link a:hover {
            color: #846651;
            transform: translateX(-5px);
        }
        
        /* Animations */
        @keyframes float {
            0%, 100% { 
                transform: translateY(0px) rotate(0deg); 
            }
            50% { 
                transform: translateY(-20px) rotate(180deg); 
            }
        }
        
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .login-container {
                max-width: 380px;
            }
            
            .login-form {
                padding: 1.5rem;
            }
            
            .login-header {
                padding: 2rem 1.5rem 1rem;
            }
            
            .brand-title {
                font-size: 1.75rem;
            }
        }
        
        @media (min-width: 769px) {
            .login-form {
                padding: 3rem;
            }
            
            .login-header {
                padding: 3rem 3rem 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="floating-shapes shape-1"></div>
        <div class="floating-shapes shape-2"></div>
        <div class="floating-shapes shape-3"></div>
        <div class="floating-shapes shape-4"></div>
    </div>

    <!-- Login Container -->
    <div class="login-container">
        <div class="login-card">
            <!-- Header -->
            <div class="login-header">
                <div class="brand-logo">
                    <img src="/2.png" alt="Logo" style="height: 80px;">
                </div>
                <h1 class="brand-title">Estilo Feminino</h1>
                <p class="brand-subtitle">Faça login para continuar sua jornada</p>
            </div>
            
            <!-- Form -->
            <div class="login-form">
                <!-- Alert -->
                <div th:if="${erro}" class="alert alert-dismissible fade show" role="alert">
                    <i class="fas fa-exclamation-triangle me-2"></i>
                    <span th:text="${erro}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                
                <form action="/login" method="post">
                    <input type="hidden" name="redirect" th:value="${param.redirect}">
                    
                    <div class="form-group">
                        <i class="fas fa-user form-icon"></i>
                        <input type="text" class="form-control" id="username" name="username" 
                               placeholder="Digite seu usuário" required>
                    </div>
                    
                    <div class="form-group">
                        <i class="fas fa-lock form-icon"></i>
                        <input type="password" class="form-control" id="password" name="password" 
                               placeholder="Digite sua senha" required>
                    </div>
                    
                    <button type="submit" class="btn btn-gradient">
                        <i class="fas fa-sign-in-alt me-2"></i>Entrar
                    </button>
                </form>
                

                
                <!-- Back Link -->
                <div class="back-link">
                    <a href="/" class="btn-glass">
                        <i class="fas fa-arrow-left me-2"></i>Voltar à loja
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>

        
        // Form animation
        document.addEventListener('DOMContentLoaded', function() {
            const formGroups = document.querySelectorAll('.form-group');
            formGroups.forEach((group, index) => {
                group.style.opacity = '0';
                group.style.transform = 'translateY(20px)';
                
                setTimeout(() => {
                    group.style.transition = 'all 0.6s ease';
                    group.style.opacity = '1';
                    group.style.transform = 'translateY(0)';
                }, (index + 1) * 200);
            });
        });
        
        // Input focus effects
        document.querySelectorAll('.form-control').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.querySelector('.form-icon').style.color = '#846651';
                this.parentElement.querySelector('.form-icon').style.transform = 'translateY(-50%) scale(1.1)';
            });
            
            input.addEventListener('blur', function() {
                this.parentElement.querySelector('.form-icon').style.color = 'rgba(132, 102, 81, 0.7)';
                this.parentElement.querySelector('.form-icon').style.transform = 'translateY(-50%) scale(1)';
            });
        });
    </script>
</body>
</html>
