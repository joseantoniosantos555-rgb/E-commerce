<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Cadastro - E-Commerce</title>
</head>
<body>
    <main>
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card">
                    <div class="card-header text-center">
                        <h4><i class="fas fa-user-plus me-2"></i>Cadastro</h4>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/register}" method="post" th:object="${user}">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="nomeUsuario" class="form-label">Nome de Usuário *</label>
                                    <input type="text" class="form-control" id="nomeUsuario" 
                                           th:field="*{nomeUsuario}" required 
                                           placeholder="Digite um nome de usuário">
                                </div>
                                
                                <div class="col-md-6 mb-3">
                                    <label for="email" class="form-label">Email *</label>
                                    <input type="email" class="form-control" id="email" 
                                           th:field="*{email}" required 
                                           placeholder="Digite seu email">
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="nomeCompleto" class="form-label">Nome Completo *</label>
                                <input type="text" class="form-control" id="nomeCompleto" 
                                       th:field="*{nomeCompleto}" required 
                                       placeholder="Digite seu nome completo">
                            </div>
                            
                            <div class="mb-3">
                                <label for="senha" class="form-label">Senha *</label>
                                <input type="password" class="form-control" id="senha" 
                                       th:field="*{senha}" required minlength="6"
                                       placeholder="Digite uma senha (mín. 6 caracteres)">
                            </div>
                            
                            <div class="mb-3">
                                <label for="endereco" class="form-label">Endereço</label>
                                <textarea class="form-control" id="endereco" th:field="*{endereco}" 
                                          rows="2" placeholder="Digite seu endereço completo"></textarea>
                            </div>
                            
                            <div class="mb-3">
                                <label for="telefone" class="form-label">Telefone</label>
                                <input type="tel" class="form-control" id="telefone" 
                                       th:field="*{telefone}" 
                                       placeholder="(11) 99999-9999">
                            </div>
                            
                            <div class="d-grid">
                                <button type="submit" class="btn btn-success">
                                    <i class="fas fa-user-plus me-2"></i>Cadastrar
                                </button>
                            </div>
                        </form>
                        
                        <hr>
                        
                        <div class="text-center">
                            <p class="mb-0">Já tem uma conta?</p>
                            <a th:href="@{/login}" class="btn btn-outline-primary btn-sm">
                                <i class="fas fa-sign-in-alt me-1"></i>Fazer Login
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
